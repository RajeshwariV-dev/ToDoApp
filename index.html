<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="desc" content="todoAPP">
<title>Todo App</title>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow todo-container">

        <h2 class="text-center mb-4 fst-italic">My Tasks</h2>

        <div class="d-flex g-5 mb-3">
            <input  type="text" id="taskInput" class="form-control" placeholder="Enter task">
            <button id="addBtn" class="fst-italic btn btn-success w-25">Add Task <i class="bi bi-list-task"></i></button>
            <button id="deleteBtn" class="fst-italic btn btn-danger w-20">Delete Task <i class="bi bi-trash3-fill"></i></button>
        </div>
        <ul id="taskList"class="list-group"></ul>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="script.js"></script>

</body>
</html>
